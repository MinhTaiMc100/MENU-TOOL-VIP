<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Menu Nổi</title>

<style>

body{
height:2000px;
background:#0f172a;
color:white;
font-family:Arial;
}

/* menu nổi */
#floatingMenu{
position:fixed;
right:50px;
bottom:50px;
width:70px;
height:70px;
background:#00ffff;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
cursor:move;
box-shadow:0 0 20px #00ffff;
}

</style>
</head>

<body>

<h1 style="text-align:center">TOOL CỦA THẦY TÀI EM</h1>

<div id="floatingMenu">⚙️</div>

<script>

let menu = document.getElementById("floatingMenu")

let isDown=false
let offsetX,offsetY

menu.addEventListener("mousedown",function(e){
isDown=true
offsetX=e.clientX-menu.offsetLeft
offsetY=e.clientY-menu.offsetTop
})

document.addEventListener("mouseup",function(){
isDown=false
})

document.addEventListener("mousemove",function(e){

if(!isDown) return

menu.style.left=(e.clientX-offsetX)+"px"
menu.style.top=(e.clientY-offsetY)+"px"

})

function md5ToDice(md5){

let dice1 = (parseInt(md5.substring(0,2),16) % 6) + 1;
let dice2 = (parseInt(md5.substring(2,4),16) % 6) + 1;
let dice3 = (parseInt(md5.substring(4,6),16) % 6) + 1;

let total = dice1 + dice2 + dice3;

let result = total >= 11 ? "TÀI" : "XỈU";

return {dice1,dice2,dice3,total,result};

})

</script>

</body>
</html>
