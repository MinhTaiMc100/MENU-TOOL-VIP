<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Casino Tool Menu</title>

<style>
body{
margin:0;
font-family:Arial;
}

/* iframe casino */
#casino{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
border:none;
}

/* menu nổi */
#menuBtn{
position:fixed;
top:200px;
right:20px;
width:60px;
height:60px;
background:#ff0033;
border-radius:50%;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
z-index:9999;
}

/* bảng tool */
#menu{
position:fixed;
top:270px;
right:20px;
background:#111;
color:white;
padding:15px;
border-radius:10px;
display:none;
z-index:9999;
}

button{
margin:5px 0;
width:120px;
padding:8px;
}
</style>
</head>

<body>

<iframe id="casino" src="https://example.com"></iframe>

<div id="menuBtn">⚙️</div>

<div id="menu">
<button onclick="predict()">Dự đoán</button>
<button onclick="reset()">Reset</button>
</div>

<script>

let btn=document.getElementById("menuBtn");
let menu=document.getElementById("menu");

btn.onclick=function(){
menu.style.display = menu.style.display=="block"?"none":"block";
}

function predict(){
alert("Tool dự đoán...");
}

function reset(){
alert("Đã reset!");
}

</script>

</body>
</html>
