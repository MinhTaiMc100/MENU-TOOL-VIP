<!DOCTYPE html>
<html>
<head>
<style>
.grid{
display:grid;
grid-template-columns:repeat(6,40px);
gap:5px;
}

.cell{
width:40px;
height:40px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-weight:bold;
}

.B{background:red;}
.P{background:blue;}
.T{background:green;}
</style>
</head>

<body>

<div class="grid" id="board"></div>

<script>

let history=["B","P","B","B","P","P","B","T"];

let board=document.getElementById("board");

history.forEach(v=>{
let div=document.createElement("div");
div.className="cell "+v;
div.innerText=v;
board.appendChild(div);
});

</script>

</body>
</html>
