<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tool Tài Xỉu Auto</title>

<style>
body{
background:#111827;
color:white;
font-family:Arial;
text-align:center;
}

.box{
margin:auto;
margin-top:120px;
width:420px;
padding:30px;
border-radius:15px;
background:#1f2937;
box-shadow:0 0 20px cyan;
}

input{
width:90%;
padding:12px;
margin-top:15px;
border-radius:8px;
border:none;
font-size:16px;
}

#result{
margin-top:25px;
font-size:28px;
font-weight:bold;
}

#rate{
margin-top:10px;
font-size:18px;
color:#00ffaa;
}
</style>
</head>

<body>

<div class="box">

<h2>TOOL TÀI XỈU AUTO</h2>

<input id="md5" placeholder="Nhập MD5..." oninput="autoPredict()">

<div id="result"></div>
<div id="rate"></div>

</div>

<script>

function autoPredict(){

let md5 = document.getElementById("md5").value;

if(md5.length < 10){
document.getElementById("result").innerHTML="";
return;
}

let score = 0;

for(let i=0;i<md5.length;i++){
score += md5.charCodeAt(i);
}

let ai = score % 100;

if(ai > 50){

document.getElementById("result").innerHTML="🎲 DỰ ĐOÁN: TÀI";
document.getElementById("result").style.color="lime";
document.getElementById("rate").innerHTML="Độ tin cậy: "+ai+"%";

}else{

document.getElementById("result").innerHTML="🎲 DỰ ĐOÁN: XỈU";
document.getElementById("result").style.color="red";
document.getElementById("rate").innerHTML="Độ tin cậy: "+(100-ai)+"%";

}

}

</script>

</body>
</html>
