<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tài Xỉu Casino Tool</title>
<style>
body{
background:#0b0f1a;
font-family:Arial;
color:white;
text-align:center;
}

h1{
color:#ffd700;
text-shadow:0 0 10px #ffd700;
}

.container{
width:320px;
margin:auto;
background:#111827;
padding:20px;
border-radius:15px;
box-shadow:0 0 20px rgba(255,215,0,0.4);
}

.buttons button{
margin:8px;
padding:12px 22px;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

.tai{background:#22c55e;color:white;}
.xiu{background:#ef4444;color:white;}

.board{
display:grid;
grid-template-columns:repeat(10,25px);
gap:5px;
justify-content:center;
margin-top:15px;
}

.cell{
width:25px;
height:25px;
border-radius:4px;
}

.green{background:#22c55e;}
.red{background:#ef4444;}

.stats{
margin-top:15px;
font-size:15px;
color:#ddd;
}

.predict{
margin-top:15px;
font-size:22px;
color:#00eaff;
text-shadow:0 0 10px #00eaff;
}
</style>
</head>

<body>

<h1>🎲 TÀI XỈU CASINO</h1>

<div class="container">

<div class="buttons">
<button class="tai" onclick="add('T')">TÀI</button>
<button class="xiu" onclick="add('X')">XỈU</button>
</div>

<div class="predict" id="predict">AI: ...</div>

<div class="stats" id="stats"></div>

<div class="board" id="board"></div>

</div>

<script>

let history=[]

function add(r){

history.push(r)

if(history.length>100){
history.shift()
}

draw()
analyze()

}

function draw(){

let board=document.getElementById("board")
board.innerHTML=""

history.forEach(v=>{

let d=document.createElement("div")
d.classList.add("cell")

if(v=="T") d.classList.add("green")
if(v=="X") d.classList.add("red")

board.appendChild(d)

})

}

function analyze(){

let tai=history.filter(x=>x=="T").length
let xiu=history.filter(x=>x=="X").length

let total=history.length

let taiP=Math.round((tai/total)*100)
let xiuP=Math.round((xiu/total)*100)

document.getElementById("stats").innerHTML=
"Tài: "+tai+" ("+taiP+"%) | Xỉu: "+xiu+" ("+xiuP+"%)"

let last=history.slice(-3).join("")

let predict=""

if(last=="TTT") predict="XỈU (có thể gãy cầu)"
else if(last=="XXX") predict="TÀI (có thể gãy cầu)"
else predict=tai>xiu?"XỈU":"TÀI"

document.getElementById("predict").innerText="AI GỢI Ý: "+predict

}

</script>

</body>
</html>
