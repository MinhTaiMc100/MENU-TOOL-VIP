<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tool Công Thức</title>

<style>
body{
background:#061a23;
font-family:Arial;
color:white;
text-align:center;
}

.container{
width:320px;
margin:auto;
margin-top:40px;
background:#081f2a;
border-radius:15px;
padding:20px;
box-shadow:0 0 20px #00eaff55;
}

.title{
margin-bottom:15px;
font-size:18px;
}

.dice-grid{
display:grid;
grid-template-columns:repeat(3,70px);
gap:10px;
justify-content:center;
margin-top:10px;
}

.dice{
width:70px;
height:70px;
border-radius:50%;
border:2px solid #00eaff;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
cursor:pointer;
}

.dice:hover{
background:#00eaff22;
}

.result{
margin-top:20px;
font-size:28px;
color:#ff4040;
}

button{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:8px;
background:#00eaff;
cursor:pointer;
font-size:16px;
}

</style>
</head>

<body>

<h2>Kết quả game</h2>

<button onclick="getGame()">Lấy kết quả</button>

<div id="result"></div>

<script>

async function getGame(){

try{

let res = await fetch("https://web.sunwin.lt/?affId=59d2a7bae0f0b1b393c1658eb441b146/api/game-result");

let data = await res.json();

document.getElementById("result").innerText =
"Kết quả: " + data.result;

}
catch(e){

document.getElementById("result").innerText =
"Không kết nối được";

}

}

</script>
  
<body>

<div class="container">

<div class="title">TOOL CÔNG THỨC</div>

<div class="dice-grid">

<div class="dice" onclick="add(1)">1</div>
<div class="dice" onclick="add(2)">2</div>
<div class="dice" onclick="add(3)">3</div>
<div class="dice" onclick="add(4)">4</div>
<div class="dice" onclick="add(5)">5</div>
<div class="dice" onclick="add(6)">6</div>

</div>

<button onclick="analyze()">PHÂN TÍCH</button>

<div class="result" id="result">---</div>

</div>

<script>

let dice=[];

function add(n){

if(dice.length>=3) return;

dice.push(n);

}

function analyze(){

if(dice.length<3){

document.getElementById("result").innerText="Chọn 3 xúc xắc";

return;

}

let total = dice[0]+dice[1]+dice[2];

if(total>=11)
document.getElementById("result").innerText="TÀI";
else
document.getElementById("result").innerText="XỈU";

dice=[];

}

</script>

</body>
</html>
