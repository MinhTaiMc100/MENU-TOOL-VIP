<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tài Xỉu Casino</title>

<style>
body{
background:#0b0f1a;
color:white;
font-family:Arial;
text-align:center;
}

h1{
color:#ffd700;
text-shadow:0 0 15px #ffd700;
}

button{
padding:12px 25px;
margin:10px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
}

.tai{
background:#22c55e;
box-shadow:0 0 10px #22c55e;
}

.xiu{
background:#ef4444;
box-shadow:0 0 10px #ef4444;
}

#history{
margin-top:20px;
font-size:20px;
}

</style>

</head>

<body>

<h1>🎲 TÀI XỈU CASINO</h1>

<button class="tai" onclick="add('T')">TÀI</button>
<button class="xiu" onclick="add('X')">XỈU</button>

<div id="history">Lịch sử: </div>

<script>

let data=[]

function add(r){

data.push(r)

document.getElementById("history").innerText =
"Lịch sử: "+data.join(" ")

}

</script>

</body>
</html>
