<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BCR Bead Plate</title>

<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
}

.board{
display:grid;
grid-template-columns:repeat(10,40px);
gap:6px;
justify-content:center;
margin-top:20px;
}

.cell{
width:40px;
height:40px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
color:white;
}

.B{background:red;}
.P{background:blue;}
.T{background:green;}

button{
margin:5px;
padding:10px 15px;
}
</style>
</head>

<body>

<h2>Bead Plate Baccarat</h2>

<button onclick="add('B')">Banker</button>
<button onclick="add('P')">Player</button>
<button onclick="add('T')">Tie</button>

<div class="board" id="board"></div>

<script>

let history=[];

function add(v){

history.push(v);

let div=document.createElement("div");
div.className="cell "+v;
div.innerText=v;

document.getElementById("board").appendChild(div);

}

</script>

</body>
</html>
