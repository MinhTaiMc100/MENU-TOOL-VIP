<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tool Tài Xỉu VIP</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

/* MENU NỔI */

.menu{
position:fixed;
top:0;
left:0;
width:100%;
background:#111827;
padding:15px;
box-shadow:0 0 10px cyan;
z-index:1000;
}

.menu button{
margin:5px;
padding:10px 15px;
border:none;
border-radius:6px;
background:cyan;
cursor:pointer;
font-weight:bold;
}

/* BOX TOOL */

.box{
margin-top:120px;
background:#1f2937;
width:420px;
margin-left:auto;
margin-right:auto;
padding:30px;
border-radius:12px;
box-shadow:0 0 15px cyan;
}

input{
width:90%;
padding:12px;
border-radius:8px;
border:none;
margin-top:15px;
}

#result{
margin-top:20px;
font-size:28px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="menu">

<button onclick="alert('Tool Tài Xỉu VIP')">🏠 Trang chủ</button>

<button onclick="alert('Lịch sử đang phát triển')">📊 Lịch sử</button>

<button onclick="alert('Cài đặt tool')">⚙️ Cài đặt</button>

</div>


<div class="box">

<h2>TOOL TÀI XỈU</h2>

<input id="md5" placeholder="Nhập MD5">

<br><br>

<button onclick="predict()">PHÂN TÍCH</button>

<div id="result"></div>

</div>


<script>

function predict(){

let md5=document.getElementById("md5").value;

let sum=0;

for(let i=0;i<md5.length;i++){
sum+=md5.charCodeAt(i);
}

if(sum%2==0){
document.getElementById("result").innerHTML="🎲 TÀI";
document.getElementById("result").style.color="lime";
}else{
document.getElementById("result").innerHTML="🎲 XỈU";
document.getElementById("result").style.color="red";
}

}

</script>

</body>
</html>
