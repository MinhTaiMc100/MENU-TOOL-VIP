<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HUD Panel Demo</title>

<style>
body{
  margin:0;
  background:#05070d;
  font-family:Arial;
}

/* HUD PANEL */
#hud{
  position:fixed;
  top:120px;
  left:100px;
  width:260px;
  padding:15px;

  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);

  border-radius:16px;
  border:1px solid #00ffff;

  box-shadow:
  0 0 10px #00ffff,
  0 0 25px #00ffff;

  color:white;
}

/* title */
#hud h3{
  margin-top:0;
  text-align:center;
  color:#00ffff;
  text-shadow:0 0 10px #00ffff;
}
</style>
</head>

<body>

<div id="hud">
<h3>HUD PANEL</h3>

<p>Status: Online</p>
<p>Signal: Good</p>

<button>Action</button>

</div>

</body>
</html>
