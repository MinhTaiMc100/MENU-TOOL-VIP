<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tool Tài Xỉu Online</title>

<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
}

.box{
margin:auto;
margin-top:120px;
width:420px;
background:#1f2937;
padding:30px;
border-radius:12px;
box-shadow:0 0 15px cyan;
}

button{
padding:12px 25px;
border:none;
border-radius:8px;
background:cyan;
font-size:18px;
cursor:pointer;
}

#result{
margin-top:25px;
font-size:26px;
}

</style>
</head>

<body>

<div class="box">

<h2>TOOL TÀI XỈU ONLINE</h2>

<button onclick="loadData()">LẤY DỮ LIỆU</button>

<div id="result">Chưa có dữ liệu</div>

</div>

<script>

function loadData(){

fetch("https://api.coindesk.com/v1/bpi/currentprice.json")

.then(res => res.json())

.then(data => {

let price = parseFloat(data.bpi.USD.rate.replace(",",""));

let result = price % 2 === 0 ? "TÀI" : "XỈU";

document.getElementById("result").innerHTML =
"🎲 Dự đoán: "+result;

})

.catch(()=>{
document.getElementById("result").innerHTML="❌ Không kết nối được";
});

}

</script>

</body>
</html>
