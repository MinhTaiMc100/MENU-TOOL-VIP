<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>TAI XIU AI VIP</title>

<style>
body{
background:#0f172a;
font-family:Arial;
color:white;
text-align:center;
}

button{
padding:10px 20px;
margin:10px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
}

.tai{background:#22c55e;color:white;}
.xiu{background:#ef4444;color:white;}

#stats{
font-size:22px;
margin-top:20px;
color:#ffd700;
}

/* menu nổi */
#menu{
position:fixed;
right:20px;
bottom:20px;
width:70px;
height:70px;
background:#00ffff;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
box-shadow:0 0 20px #00ffff;
cursor:move;
}
</style>

</head>

<body>

<h1>🎲 TOOL TÀI XỈU</h1>

<button class="tai" onclick="add('T')">TÀI</button>
<button class="xiu" onclick="add('X')">XỈU</button>

<div id="stats">
📈 Tài 0% | Xỉu 0%
</div>

<div id="menu">
⚙️
</div>

<script>

let history=[]

function add(r){

history.push(r)

let tai = history.filter(x=>x=="T").length
let xiu = history.filter(x=>x=="X").length

let total = history.length

let taiPercent = Math.round((tai/total)*100)
let xiuPercent = Math.round((xiu/total)*100)

document.getElementById("stats").innerText =
"📈 Tài "+taiPercent+"% | Xỉu "+xiuPercent+"%"

}

/* menu kéo được */

let menu=document.getElementById("menu")

let offsetX,offsetY,isDown=false

menu.addEventListener("mousedown",e=>{
isDown=true
offsetX=e.clientX-menu.offsetLeft
offsetY=e.clientY-menu.offsetTop
})

document.addEventListener("mouseup",()=>isDown=false)

document.addEventListener("mousemove",e=>{

if(!isDown) return

menu.style.left=(e.clientX-offsetX)+"px"
menu.style.top=(e.clientY-offsetY)+"px"

})
  
<style>

body{
background:#0b0f1a;
color:white;
font-family:Arial;
text-align:center;
}

h1{
color:#ffd700;
text-shadow:0 0 15px #ffd700;
}

button{
padding:12px 25px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
}

.tai{
background:#22c55e;
box-shadow:0 0 10px #22c55e;
}

.xiu{
background:#ef4444;
box-shadow:0 0 10px #ef4444;
}

.board{
display:grid;
grid-template-columns:repeat(10,30px);
gap:6px;
justify-content:center;
margin-top:20px;
}

.cell{
width:30px;
height:30px;
border-radius:6px;
}

button{
margin:10px;
padding:10px 25px;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

.result{
font-size:28px;
margin-top:20px;
color:#ffd700;
}

</style>

</head>

<body>

<h1>🎲 TOOL TÀI XỈU AI VIP</h1>

<div>

<button onclick="add('T')">TÀI</button>
<button onclick="add('X')">XỈU</button>

</div>

<div class="result" id="predict">
AI: ...
</div>

<div class="board" id="board"></div>

<script>

let data=[];

function add(v){

data.push(v)

if(data.length>50){
data.shift()
}

render()

predict()

}

function render(){

let board=document.getElementById("board")
board.innerHTML=""

data.forEach(d=>{

let c=document.createElement("div")
c.classList.add("cell")

if(d=="T") c.classList.add("tai")
if(d=="X") c.classList.add("xiu")

board.appendChild(c)

})

}

function predict(){

let last=data.slice(-4)

let result=""

if(last.join("")=="TTTT"){
result="XỈU (gãy cầu)"
}
else if(last.join("")=="XXXX"){
result="TÀI (gãy cầu)"
}
else if(last.join("")=="TXT" || last.join("")=="XTX"){
result="ĐANG CẦU 1-1"
}
else{

let t=data.filter(x=>x=="T").length
let x=data.filter(x=>x=="X").length

result=t>x?"XỈU":"TÀI"

}

document.getElementById("predict").innerText="AI GỢI Ý: "+result

}

  
</script>

</body>
</html>
