<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BCR Pattern Tool</title>

<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
padding:20px;
}

button{
padding:10px 16px;
margin:5px;
font-size:16px;
border:none;
border-radius:6px;
cursor:pointer;
}

.b{background:red;color:white;}
.p{background:blue;color:white;}
.t{background:green;color:white;}
.r{background:orange;color:black;}

#history{
margin-top:20px;
font-size:18px;
}

#pattern{
margin-top:20px;
font-size:24px;
color:#facc15;
}

</style>
</head>

<body>

<h2>BCR PATTERN VIP TOOL</h2>

<button class="b" onclick="add('B')">Banker</button>
<button class="p" onclick="add('P')">Player</button>
<button class="t" onclick="add('T')">Tie</button>
<button class="r" onclick="resetGame()">Reset</button>

<div id="history"></div>

<div id="pattern">Chưa có dữ liệu</div>

<script>

let history=[];

function add(v){

history.push(v);

document.getElementById("history").innerText =
"Lịch sử: "+history.join(" ");

analyze();

}

function analyze(){

if(history.length<4){

document.getElementById("pattern").innerText="Chưa đủ dữ liệu";

return;

}

let last4 = history.slice(-4).join("");

if(last4==="BBBB")
document.getElementById("pattern").innerText="Cầu bệt Banker";

else if(last4==="PPPP")
document.getElementById("pattern").innerText="Cầu bệt Player";

else if(last4==="BPBP" || last4==="PBPB")
document.getElementById("pattern").innerText="Cầu 1-1";

else
document.getElementById("pattern").innerText="Cầu gãy";

}

function resetGame(){

history=[];

document.getElementById("history").innerText="";
document.getElementById("pattern").innerText="Đã reset";

}

</script>

</body>
</html>
