<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI BCR Tool</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#0f172a;
color:white;
}

button{
padding:10px 15px;
margin:5px;
}

#history{
margin-top:20px;
font-size:18px;
}

#predict{
margin-top:20px;
font-size:24px;
}
</style>

</head>

<body>

<h2>Tool BCR AI</h2>

<button onclick="add('B')">Banker</button>
<button onclick="add('P')">Player</button>
<button onclick="add('T')">Tie</button>

<div id="history"></div>
<div id="predict">Chưa có dữ liệu</div>

<script>

let history=[];

function add(v){

history.push(v);

document.getElementById("history").innerText =
"Lịch sử: " + history.join(" ");

analyze();

}

function analyze(){

if(history.length < 4){
document.getElementById("predict").innerText =
"Chưa đủ dữ liệu";
return;
}

let last4 = history.slice(-4);

let banker = last4.filter(x => x=="B").length;
let player = last4.filter(x => x=="P").length;

if(banker > player){
document.getElementById("predict").innerText =
"Gợi ý: PLAYER";
}
else if(player > banker){
document.getElementById("predict").innerText =
"Gợi ý: BANKER";
}
else{
document.getElementById("predict").innerText =
"Cầu cân – theo chuỗi";
}

}

</script>

</body>
</html>
