<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>BCR VIP Menu</title>
<style>
body{
  background:#222;
  height:100vh;
  margin:0;
}
#menu{
  position:fixed;
  top:100px;
  left:100px;
  width:220px;
  background:#111;
  color:white;
  border-radius:12px;
  padding:12px;
  font-family:Arial;
  box-shadow:0 0 10px #000;
  cursor:move;
  user-select: none;
  -webkit-user-select: none;
}
h3{
  margin:0;
  text-align:center;
  color:cyan;
}
.btn{
  width:100%;
  margin:4px 0;
  padding:8px;
  border:none;
  border-radius:6px;
  font-size:14px;
  cursor:pointer;
}
.btn:hover{
  opacity:0.8;
}
.banker{background:#2ecc71;}
.player{background:#3498db;}
.reset{background:#555;color:white;}
#info{margin-top:8px;font-size:14px;text-align:center;}
#alertBox{margin-top:6px;font-weight:bold;}
</style>
</head>

<body>

<div id="menu">
  <h3>BCR VIP</h3>

  <button class="btn banker" onclick="add('B')">Banker</button>
  <button class="btn player" onclick="add('P')">Player</button>
  <button class="btn reset" onclick="reset()">Reset</button>

  <div id="info"></div>
  <div id="alertBox"></div>
</div>

<script>
let history = [];

function add(v){
  history.push(v);
  update();
}

function reset(){
  history=[];
  update();
}

function calcStreak(){
  if(history.length==0) return ["",0];
  let last = history[history.length-1];
  let s=1;
  for(let i=history.length-2;i>=0;i--){
    if(history[i]==last) s++;
    else break;
  }
  return [last,s];
}

function update(){
  const info = document.getElementById("info");
  const alertBox = document.getElementById("alertBox");
  
  if(history.length==0){
    info.innerHTML="Chưa có dữ liệu";
    alertBox.innerHTML="";
    return;
  }

  let b = history.filter(x=>x=="B").length;
  let p = history.filter(x=>x=="P").length;
  let n = history.length;

  let pb = (b/n*100).toFixed(1);
  let pp = (p/n*100).toFixed(1);

  let [last,streak]=calcStreak();

  info.innerHTML = `
    Hands: ${n}<br>
    Banker: ${pb}%<br>
    Player: ${pp}%<br>
    Streak: ${last} x${streak}
  `;

  if(pb>=60 && last=="B" && streak>=3){
    alertBox.style.color="lime";
    alertBox.innerText="Cầu mạnh BANKER";
  }
  else if(pp>=60 && last=="P" && streak>=3){
    alertBox.style.color="lime";
    alertBox.innerText="Cầu mạnh PLAYER";
  }
  else if(pb>=55 || pp>=55){
    alertBox.style.color="yellow";
    alertBox.innerText="Cầu nghiêng";
  }
  else{
    alertBox.style.color="red";
    alertBox.innerText="Cầu nhiễu";
  }
}

/* kéo menu */
let menu = document.getElementById("menu");
let isDown=false,offsetX,offsetY;

menu.addEventListener("mousedown",e=>{
  e.preventDefault();
  isDown=true;
  offsetX=e.clientX-menu.offsetLeft;
  offsetY=e.clientY-menu.offsetTop;
});

document.addEventListener("mouseup",()=>isDown=false);

document.addEventListener("mousemove",e=>{
  if(!isDown) return;
  menu.style.left=(e.clientX-offsetX)+"px";
  menu.style.top=(e.clientY-offsetY)+"px";
});
</script>

</body>
</html>
